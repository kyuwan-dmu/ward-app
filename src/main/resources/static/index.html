<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>WARD</title>
	<link rel="stylesheet" href="/styles.css">
</head>
<body>
	<div class="page">
		<header class="topbar">
			<div class="brand-wrap">
				<div class="brand">WARD</div>
				<div class="tagline" id="tagline">Neighborhood food recommendations</div>
			</div>
			<div class="auth">
				<div class="welcome" id="welcome-message">Welcome, Gangaji!</div>
				<div class="actions">
					<button type="button" class="outline-button accent">Logout</button>
					<button type="button" class="outline-button">My Page</button>
				</div>
			</div>
		</header>

		<main class="content">
			<section class="search-panel">
				<div class="search-box">
					<input id="location-input" type="text" value="Guil Station" aria-label="Area search">
					<button type="button" class="search-button" aria-label="Search"></button>
				</div>
			</section>

			<section class="weather-panel">
				<div class="weather-title" id="weather-location">Weather around Guil Station</div>
				<div class="weather-card">
					<div class="weather-main">
						<span class="weather-icon">CLOUD</span>
						<span class="temperature" id="weather-temperature">22.6C</span>
						<span class="status" id="weather-status">Cloudy</span>
					</div>
					<div class="weather-meta">
						<div>Dust <strong id="dust-status">Good</strong></div>
						<div>Feels like <strong id="feels-like">20.3C</strong></div>
					</div>
				</div>
			</section>

			<section class="map-panel">
				<div class="mock-map" id="map">
					<div class="river"></div>
					<div class="road road-primary"></div>
					<div class="road road-secondary"></div>
					<div class="road road-diagonal"></div>
					<div class="label station">Guil Station</div>
					<div class="label district">Gocheok-dong</div>
					<div class="label river-name">Anyangcheon</div>
					<div class="marker marker-1">1</div>
					<div class="marker marker-2">2</div>
					<div class="marker marker-3">3</div>
					<div class="marker marker-4">4</div>
				</div>
			</section>

			<section class="restaurant-panel">
				<div class="restaurant-list" id="restaurant-list"></div>
			</section>
		</main>
	</div>

	<script src="/app.js"></script>
</body>
</html>
